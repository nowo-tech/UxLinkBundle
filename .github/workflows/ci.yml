name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: PHP ${{ matrix.php }} - Symfony ${{ matrix.symfony }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']
        symfony: ['7.0', '7.4', '8.0', '8.1']
        exclude:
          - php: '8.2'
            symfony: '8.0'
          - php: '8.2'
            symfony: '8.1'
          - php: '8.3'
            symfony: '8.0'
          - php: '8.3'
            symfony: '8.1'

    steps:
      - uses: actions/checkout@v7

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: json, zip
          coverage: pcov
          tools: composer:v2

      - run: composer validate --strict

      - name: Install dependencies
        run: |
          composer require \
            symfony/config:^${{ matrix.symfony }} \
            symfony/dependency-injection:^${{ matrix.symfony }} \
            symfony/framework-bundle:^${{ matrix.symfony }} \
            symfony/http-kernel:^${{ matrix.symfony }} \
            symfony/translation:^${{ matrix.symfony }} \
            symfony/twig-bundle:^${{ matrix.symfony }} \
            symfony/yaml:^${{ matrix.symfony }} \
            symfony/ux-twig-component:^3.0 \
            --no-interaction --no-update
          composer require --dev \
            symfony/browser-kit:^${{ matrix.symfony }} \
            symfony/phpunit-bridge:^${{ matrix.symfony }} \
            --no-interaction --no-update
          composer update symfony/* --with-all-dependencies --no-interaction --prefer-dist

      - run: composer test

      - if: matrix.php == '8.2' && matrix.symfony == '7.4'
        run: composer test-coverage

  cs-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
      - run: composer install --prefer-dist --no-progress
      - run: composer cs-check

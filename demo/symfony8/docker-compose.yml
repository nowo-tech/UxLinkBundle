name: ux-link-bundle-demo-symfony-8

services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ux-link-bundle-demo-symfony-8-php
    working_dir: /app
    ports:
      - "${PORT:-8048}:80"
    volumes:
      - .:/app
      - ../..:/var/ux-link-bundle
      - ./docker/frankenphp/Caddyfile.dev:/etc/frankenphp/Caddyfile.dev
      - ./docker/php-dev.ini:/usr/local/etc/php/conf.d/99-dev.ini:ro
      - composer-cache:/root/.composer/cache
    environment:
      - COMPOSER_ALLOW_SUPERUSER=1
      - APP_ENV=${APP_ENV:-dev}
      - APP_DEBUG=${APP_DEBUG:-1}
      - APP_SECRET=${APP_SECRET:-demo-secret}
      - TRUSTED_PROXIES=${TRUSTED_PROXIES:-127.0.0.1,REMOTE_ADDR}
      - DEFAULT_URI=${DEFAULT_URI:-http://localhost}
    # Mitigate Docker/WSL DNS failures resolving repo.packagist.org (composer curl error 6).
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - ux-link-bundle-demo-symfony-8-network

volumes:
  composer-cache:
    driver: local

networks:
  ux-link-bundle-demo-symfony-8-network:
    driver: bridge
